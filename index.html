<script>
    let currentLang = 'el';
    let currentCategory = null;

    const translations = {
      el: "Ελληνικά", en: "English", fr: "Français", de: "Deutsch",
      it: "Italiano", es: "Español", ru: "Русский", sr: "Srpski",
      bg: "Български", ro: "Română", al: "Shqip", tr: "Türkçe"
    };

    let menuData = { categories: [], products: [] };

    async function loadMenu() {
      try {
        const res = await fetch('menu.json');
        menuData = await res.json();
        renderLanguages();
        renderCategories();
        if (menuData.categories.length > 0) {
          showCategory(menuData.categories[0].id);
        }
      } catch (e) {
        console.error(e);
        document.getElementById('productsContainer').innerHTML = 
          `<p style="text-align:center; padding:60px 20px; color:#c00; font-size:1.1em;">
            Δεν βρέθηκε το αρχείο menu.json<br>
            <small>Δημιούργησε το menu.json πρώτα</small>
          </p>`;
      }
    }

    function renderLanguages() {
      const container = document.getElementById('langButtons');
      container.innerHTML = '';
      Object.keys(translations).forEach(lang => {
        const btn = document.createElement('button');
        btn.className = `lang-btn ${lang === currentLang ? 'active' : ''}`;
        btn.textContent = translations[lang];
        btn.onclick = () => {
          currentLang = lang;
          renderLanguages();
          renderCategories();
          if (currentCategory) showCategory(currentCategory);
        };
        container.appendChild(btn);
      });
    }

    function renderCategories() {
      const container = document.getElementById('categories');
      container.innerHTML = '';
      menuData.categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `cat-btn ${cat.id === currentCategory ? 'active' : ''}`;
        btn.textContent = cat.name[currentLang] || cat.name.el;
        btn.onclick = () => showCategory(cat.id);
        container.appendChild(btn);
      });
    }

    function showCategory(catId) {
      currentCategory = catId;
      renderCategories();

      const container = document.getElementById('productsContainer');
      const cat = menuData.categories.find(c => c.id === catId);
      container.innerHTML = `<h2 style="margin: 25px 0 20px; text-align:center; color:#1e2a1e;">
        ${cat ? (cat.name[currentLang] || cat.name.el) : ''}
      </h2>`;

      const filtered = menuData.products.filter(p => p.category === catId);

      if (filtered.length === 0) {
        container.innerHTML += `<p style="text-align:center; padding:40px; color:#666;">Δεν υπάρχουν ακόμα προϊόντα σε αυτή την κατηγορία.</p>`;
        return;
      }

      filtered.forEach(product => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <img src="\( {product.image || 'https://via.placeholder.com/130x130'}" alt=" \){product.name.el}">
          <div class="product-info">
            <h3>${product.name[currentLang] || product.name.el}</h3>
            <p class="description">
              ${product.description ? (product.description[currentLang] || product.description.el || '') : ''}
            </p>
            <div class="price">${product.price} €</div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // Αρχικοποίηση
    loadMenu();
        </script>
