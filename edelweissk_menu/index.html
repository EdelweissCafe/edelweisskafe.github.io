
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edelweiss Café – Menu</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        header {
            text-align: center;
            padding: 30px 10px;
        }

        header img {
            width: 140px;
            height: auto;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 26px;
            letter-spacing: 2px;
            margin: 0;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .section h2 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #f4d47c;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 18px;
        }

        .price {
            color: #f4d47c;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <!-- Βάλε εδώ το logo σου -->
    <img src="logo.png" alt="Edelweiss Logo">
    <h1>EDELWEISS CAFÉ</h1>
</header>

<div class="section">
    <h2>Καφέδες</h2>

    <div class="item"><span>Espresso</span><span class="price">2.00€</span></div>
    <div class="item"><span>Cappuccino</span><span class="price">2.50€</span></div>
    <div class="item"><span>Freddo Espresso</span><span class="price">2.50€</span></div>
    <div class="item"><span>Freddo Cappuccino</span><span class="price">3.00€</span></div>
</div>

<div class="section">
    <h2>Ροφήματα</h2>

    <div class="item"><span>Σοκολάτα Ζεστή</span><span class="price">3.00€</span></div>
    <div class="item"><span>Τσάι</span><span class="price">2.00€</span></div>
</div>

<div class="section">
    <h2>Snacks</h2>

    <div class="item"><span>Τοστ</span><span class="price">2.50€</span></div>
    <div class="item"><span>Κρουασάν</span><span class="price">2.00€</span></div>
</div>

</body>
</html>
